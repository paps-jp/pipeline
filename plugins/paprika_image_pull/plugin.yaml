name: paprika-image-pull
description: |
  paprika hub の completed/review ジョブから kind=image asset を pull し、
  画像 byte download + raw/{dir_no}/{id}.jpg 保存 + crawl_image table INSERT
  を行う pipeline plugin。

  crawl.py の `crawl_page 画像 ingest 部分` を移植。 normalize_image_url +
  data_url_to_sha256 + save_one_image_url + download_image_to_tmp の
  helper を全部コピー (= B-full Approach、 crawl.py 依存無し)。

  self-loop 方式 (= 1 tick で N jobs 処理 → sleep → 次 tick 自己 enqueue)。
workload_type: self_loop

init_kwargs:
  - key: db_env_file
    type: path
    default: /mnt/paps-ai/ai/.env
    label: DB 接続情報 (.env)

  - key: paprika_hub
    type: str
    default: http://10.10.50.34:8000
    label: paprika hub URL

  - key: raw_dir
    type: path
    default: /mnt/paps-ai-data/crawl/raw
    label: 画像保存先 root (= /raw/{dir_no}/{image_id}.jpg)

  - key: tmp_dir
    type: path
    default: /mnt/paps-ai-data/crawl/raw/work
    label: 一時 download 先

  - key: interval_s
    type: int
    default: 60
    label: ループ間隔 (秒) — hit 時に短縮 / idle 時に延長
    min: 5
    max: 3600

  - key: page_limit
    type: int
    default: 500
    label: 1 tick で取得するジョブ数 (ページサイズ)
    min: 1
    max: 500

  - key: max_jobs_per_tick
    type: int
    default: 2000
    label: 1 tick の最大処理ジョブ数 (大量バックログ時の分割処理)
    min: 100
    max: 50000

  - key: statuses
    type: str
    default: completed,review
    label: 取込対象 status

  - key: dir_base
    type: int
    default: 1000
    label: dir 番号の単位 (= file_no // dir_base)

hidden_kwargs:
  - workload_slug
  - control_url

ui_panel: true
ui_panel_mode: image

success_criteria:
  type: exit_code
  expected: 0

priority: 100
weight: 1.0
batch_size: 1
lease_secs: 900
max_concurrent_per_host: 1
max_attempts: 3
resources:
  vram_mb: 0

enabled: true

host_affinity:
  - ai-gpu1
  - ai-gpu3
  - ai-gpu4
  - ai-gpu5
