name: pipeline-supervisor
description: |
  パイプライン全体のオーケストレーター。 30s ごとに以下を観測:
   - GPU host 別の利用率 / power / mem (= /api/v1/workers/metrics)
   - 各 workload の queue 深さ + throughput + drain ETA
   - 直近 run output_json (= adapt 状態 / dup ratio 等)

  外部 yaml (`orchestration_rules.yaml`) に書かれた if-then ルールを当て、
  必要なら `PUT /api/v1/workloads/<slug>` で priority / lease_secs /
  host_affinity / enabled を書き換える。

  race 防止: host_affinity を 1 ホストに限定して 1 インスタンス保証。
  既定 = dry-run (= action は service_logs に出すだけで PUT しない)。
  検証後 `apply_mode=true` で実適用に切替。

workload_type: self_loop

init_kwargs:
  - key: control_url
    type: str
    default: http://127.0.0.1:8001
    label: pipeline-oss 制御プレーン URL
    help: 別ホストの worker daemon で動かす場合は LAN IP を指定
  - key: rules_path
    type: path
    default: ""
    label: ルール定義 yaml の絶対パス (= 空ならプラグイン同梱の orchestration_rules.yaml)
    help: 編集 → 次 tick から反映 (= worker daemon の再起動不要)
  - key: interval_s
    type: int
    default: 30
    label: 評価間隔 (秒)
    min: 10
    max: 600
  - key: metrics_minutes
    type: int
    default: 10
    label: GPU メトリクス window (分)
    min: 1
    max: 60
  - key: throughput_window_min
    type: int
    default: 10
    label: スループット計算 window (分)
    min: 1
    max: 60
  - key: apply_mode
    type: int
    default: 0
    label: 1=実際に PUT 適用 / 0=dry-run (= log のみ)
    min: 0
    max: 1
  - key: max_priority
    type: int
    default: 200
    label: priority bump 上限
    min: 100
    max: 1000

  # ---------------- adaptive bin-packing balancer ---------------- #
  # tank pressure + VRAM 85% packing + OOM 降格を自動で行う。 既存 rule と並列稼働。
  - key: balancer_enabled
    type: int
    default: 0
    label: balancer ON/OFF (1=on, 0=off)
    help: ON にすると VRAM 85% を目標に worker filter を tank pressure で自動再配分
    min: 0
    max: 1
  - key: balancer_apply_mode
    type: int
    default: 0
    label: balancer 実適用 (1=POST 発行, 0=dry-run log のみ)
    min: 0
    max: 1
  - key: balancer_vram_safety_frac
    type: str
    default: "0.85"
    label: VRAM 利用目標率 (0.0-1.0)
    help: host capacity の何 % まで詰めるか
  - key: balancer_max_workers_per_workload
    type: int
    default: 6
    label: 1 workload あたりの最大 worker 数 / host
    min: 1
    max: 64
  - key: balancer_max_swaps_per_cycle
    type: int
    default: 6
    label: 1 cycle で動かす worker 数の上限 (= 急変動防止)
    min: 1
    max: 32
  - key: balancer_min_dwell_s
    type: int
    default: 300
    label: swap 後の固定時間 (秒、 短すぎると flap)
    min: 30
    max: 3600
  - key: balancer_swap_margin
    type: str
    default: "1.3"
    label: swap 発動の score 倍率 (= 新スコア ≥ 現 × margin で発動)
  - key: balancer_oom_window_min
    type: int
    default: 10
    label: OOM 検知 window (分)
    min: 1
    max: 60
  - key: balancer_oom_demote_threshold
    type: int
    default: 3
    label: window 内 OOM 件数で降格判定
    min: 1
    max: 100
  - key: balancer_oom_cooldown_s
    type: int
    default: 1800
    label: 降格後の cool-down (秒)
    min: 60
    max: 86400

  # ---------------- MariaDB tank pressure balancer ---------------- #
  # MariaDB-backed workload の queue depth 監視。depth_hi 超えでアイドル worker を
  # 一時追加投入し、depth_lo + min_dwell_s 後に解放する。
  # preemption ループ回避のため追加 worker を専用化 ([slug] 単独 filter) する。
  - key: tank_pressure_enabled
    type: int
    default: 0
    label: tank pressure ON/OFF (1=on, 0=off)
    min: 0
    max: 1
  - key: tank_pressure_apply_mode
    type: int
    default: 0
    label: tank pressure 実適用 (1=POST 発行, 0=dry-run log のみ)
    min: 0
    max: 1
  - key: tank_depth_hi
    type: int
    default: 50000
    label: worker 追加を発動する queue 深さ閾値
    min: 100
    max: 10000000
  - key: tank_depth_lo
    type: int
    default: 10000
    label: worker 解放を発動する queue 深さ閾値
    min: 0
    max: 10000000
  - key: tank_max_extra_workers
    type: int
    default: 3
    label: 1 workload に追加できる worker 数の上限
    min: 1
    max: 20
  - key: tank_min_dwell_s
    type: int
    default: 300
    label: 追加後に解放を待つ最短時間 (秒、 flap 防止)
    min: 30
    max: 3600
  # upstream boost: downstream tank ≈ 0 のとき upstream producer に worker を追加
  - key: tank_upstream_map
    type: str
    default: ""
    label: '上流 workload マップ (JSON例: {"face-person-link":"image-hash-extract"})'
    help: |
      downstream tank がゼロに近づいたとき、対応する upstream workload に
      アイドル worker を追加投入する。 downstream が回復後 min_dwell_s 後に解放。
  - key: tank_upstream_lo
    type: int
    default: 100
    label: upstream boost 発動閾値 (downstream pending がこの値以下で発動)
    min: 0
    max: 100000

  # ---------------- self_loop stall watcher ---------------- #
  # claimed=0 かつ throughput=0 が続く self_loop workload を検知して自動 re-enqueue する。
  - key: stall_watcher_enabled
    type: int
    default: 0
    label: stall watcher ON/OFF (1=on, 0=off)
    min: 0
    max: 1
  - key: stall_watcher_apply_mode
    type: int
    default: 0
    label: stall watcher 実適用 (1=POST 発行, 0=dry-run log のみ)
    min: 0
    max: 1
  - key: stall_threshold
    type: int
    default: 10
    label: stall 判定の pending 最小件数 (これ未満なら stall とみなさない)
    min: 1
    max: 100000
  - key: stall_timeout_s
    type: int
    default: 300
    label: stall が何秒続いたら re-enqueue するか
    min: 60
    max: 3600

hidden_kwargs:
  - workload_slug
  - control_url

success_criteria:
  type: exit_code
  expected: 0

priority: 50
weight: 1.0
batch_size: 1
lease_secs: 60
max_attempts: 3
resources:
  vram_mb: 0

# race 防止: 1 ホストに固定して 1 インスタンス保証する想定。
# 既定は空 (= 任意 worker)。 本番では UI / API で 1 host 限定推奨。
# 例: ["ai-gpu1-1"] = 特定の worker daemon インスタンスに固定。
host_affinity: []
